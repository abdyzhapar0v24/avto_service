{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Автосервис{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<header>
    <h1>Автосервис</h1>
    <nav>
    <a href="{% url 'home' %}">Главная</a>
    {% if user.is_authenticated %}
        <a href="{% url 'create-booking' %}">Записаться</a>
        <a href="{% url 'my-bookings' %}">Мои записи</a>
        {% if user.is_staff %}
            <a href="{% url 'admin-dashboard' %}">Админка</a>
        {% endif %}
        <a href="{% url 'logout' %}">Выйти</a>
    {% else %}
        <a href="{% url 'login' %}">Войти</a>
        <a href="{% url 'register' %}">Регистрация</a>
    {% endif %}
</nav>

</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
